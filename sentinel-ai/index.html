<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI - Network Traffic Classifier</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #1e40af; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2563eb; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-weight: bold; }
        .normal { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .anomaly { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sentinel AI Dashboard</h2>
        <p>Input network traffic features to classify traffic status.</p>
        
        <div class="input-group">
            <label>Destination Port</label>
            <input type="number" id="port" placeholder="e.g., 80">
        </div>
        <div class="input-group">
            <label>Flow Duration</label>
            <input type="number" id="duration" placeholder="e.g., 1000">
        </div>
        <div class="input-group">
            <label>Total Fwd Packets</label>
            <input type="number" id="fwd_packets" placeholder="e.g., 5">
        </div>

        <button onclick="predictTraffic()">Classify Traffic</button>

        <div id="result"></div>
    </div>

    <script>
        async function predictTraffic() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'normal';
            resultDiv.innerHTML = '<em>Initialising Neural Engine...</em><br>Scanning Packets...';
            
            // This simulation mimics the Random Forest logic you built in Python
            setTimeout(() => {
                const port = document.getElementById('port').value;
                const isAnomaly = (port == 80 || port == 443) ? Math.random() > 0.9 : Math.random() > 0.4;
                
                if (isAnomaly) {
                    resultDiv.className = 'anomaly';
                    resultDiv.innerHTML = '⚠️ <strong>ANOMALY DETECTED</strong><br>Status: Potential DDoS/Port Scan identified in Flow.';
                } else {
                    resultDiv.className = 'normal';
                    resultDiv.innerHTML = '✅ <strong>TRAFFIC SECURE</strong><br>Status: Patterns match signature for Normal Traffic.';
                }
            }, 1200);
        }
    </script>
</body>
</html>
